<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوصلة القرار المهني</title>
<style>
body{
margin:0;
font-family:Arial, Tahoma;
background:linear-gradient(180deg,#f5f9ff,#eef4ff);
color:#1b3557;
text-align:center;
}
.container{
max-width:700px;
margin:auto;
padding:40px 20px;
}
h1{
font-size:36px;
margin-bottom:10px;
}
.card{
background:white;
border-radius:18px;
padding:25px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
margin-top:20px;
}
label{
display:block;
margin-top:15px;
font-weight:bold;
}
input,select{
width:100%;
padding:12px;
margin-top:6px;
border-radius:10px;
border:1px solid #d3dbea;
}
button{
margin-top:20px;
padding:14px;
width:100%;
border:none;
border-radius:12px;
background:#3b78ff;
color:white;
font-size:18px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

<h1>🧭 بوصلة القرار المهني</h1>

<div class="card">

<label>الاسم</label>
<input type="text">

<label>الصف</label>
<select>
<option>الأول الثانوي</option>
<option>الثاني الثانوي</option>
<option>الثالث الثانوي</option>
</select>

<button>ابدأ التقييم</button>

</div>

</div>

</body>
</html>
